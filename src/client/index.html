<!DOCTYPE html>
<html lang="en" class="dark">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>teamchat</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<script>
		tailwind.config = {
			darkMode: 'class',
			theme: {
				extend: {
					colors: {
						surface: {
							app: 'var(--surface-app)',
							panel: 'var(--surface-panel)',
							elevated: 'var(--surface-elevated)',
							background: 'var(--surface-background)',
						},
						text: {
							primary: 'var(--text-primary)',
							secondary: 'var(--text-secondary)',
							muted: 'var(--text-muted)',
						},
						border: {
							subtle: 'var(--border-subtle)',
							strong: 'var(--border-strong)',
						},
						accent: {
							lead: 'var(--accent-lead)',
						},
					},
					animation: {
						'slide-in-left': 'slideInLeft 150ms ease-out',
						'slide-in-right': 'slideInRight 150ms ease-out',
						'pop-in': 'popIn 200ms cubic-bezier(0.175, 0.885, 0.32, 1.275)',
						'pulse-unblock': 'pulseUnblock 3s ease-in-out',
						'fade-in': 'fadeIn 150ms ease-out',
						'sheet-in': 'sheetIn 180ms ease-out',
					},
					keyframes: {
						slideInLeft: {
							'0%': { opacity: '0', transform: 'translateX(-18px)' },
							'100%': { opacity: '1', transform: 'translateX(0)' },
						},
						slideInRight: {
							'0%': { opacity: '0', transform: 'translateX(18px)' },
							'100%': { opacity: '1', transform: 'translateX(0)' },
						},
						popIn: {
							'0%': { opacity: '0', transform: 'scale(0.88)' },
							'100%': { opacity: '1', transform: 'scale(1)' },
						},
						pulseUnblock: {
							'0%, 100%': { boxShadow: '0 0 0 0 rgba(79, 70, 229, 0)' },
							'50%': { boxShadow: '0 0 0 4px rgba(79, 70, 229, 0.28)' },
						},
						fadeIn: {
							'0%': { opacity: '0' },
							'100%': { opacity: '1' },
						},
						sheetIn: {
							'0%': { opacity: '0', transform: 'translateY(24px)' },
							'100%': { opacity: '1', transform: 'translateY(0)' },
						},
					},
					fontFamily: {
						sans: ['"IBM Plex Sans"', '"SF Pro Text"', '"Segoe UI"', 'system-ui', 'sans-serif'],
						mono: ['"IBM Plex Mono"', '"SFMono-Regular"', '"SF Mono"', 'Menlo', 'monospace'],
					},
				},
			},
		};
	</script>
	<link rel="stylesheet" href="/styles/index.css" />
	<link rel="stylesheet" href="/styles/theme-claude.css" />
	<script>
		// Apply theme from ?theme= query param before first paint
		(function() {
			var t = new URLSearchParams(window.location.search).get('theme');
			if (t && ['claude'].includes(t)) document.documentElement.setAttribute('data-theme', t);
		})();
	</script>
</head>
<body class="bg-surface-app text-text-primary antialiased">
	<div id="root"></div>
	<script type="module" src="/app.js"></script>
</body>
</html>
